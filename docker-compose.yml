# Docker Compose reads a file named exactly `.env` in this folder for `${VAR}`
# substitution (e.g. FRONTEND_EXPOSED_PORT). A file named `.env.prod` alone does not
# apply to interpolation: copy or symlink: `cp .env.prod .env` on the server, or set
# the same variables in Dokploy/host environment before `docker compose up`.
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ./.env
    ports:
      - "${BACKEND_EXPOSED_PORT:-5000}:${BACKEND_PORT}"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:5000}
    env_file:
      - ./.env
    ports:
      - "${FRONTEND_EXPOSED_PORT:-3000}:3000"
    depends_on:
      - backend

